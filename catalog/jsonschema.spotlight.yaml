      - experience:data-modeling
  document-require-type:
    description: The `type` property should be present.
    message: type should be present
    severity: info
    given: $
    then:
      field: type
      function: truthy
    tags:
      - format:jsonschema
      - spec:schemas
      - experience:data-modeling
      - experience:consistency
  schema-property-require-description:
    description: The `description` property of each property should be present.
    message: description should be present
    severity: info
    given: $.properties[*]
    then:
      field: description
      function: truthy
    tags:
      - format:jsonschema
      - spec:properties
      - experience:documentation
      - experience:data-modeling
  schema-property-require-type:
    description: The `type` property of each property should be present.
    message: type should be present
    severity: info
    given: $.properties[*]
    then:
      field: type
      function: truthy
    tags:
      - format:jsonschema
      - spec:properties
