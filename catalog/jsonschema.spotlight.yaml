    then:
      field: $id
      function: truthy
    tags:
      - format:jsonschema
      - spec:schemas
      - experience:data-modeling
      - experience:consistency
  document-require-property:
    description: The `properties` property should be present.
    message: properties should be present
    severity: info
    given: $
    then:
      field: properties
      function: truthy
    tags:
      - format:jsonschema
      - spec:schemas
      - experience:data-modeling
      - experience:consistency
  document-require-required-list:
    description: The `required` property should be present.
    message: required should be present
    severity: info
    given: $
    then:
      field: required
      function: truthy
    tags:
      - format:jsonschema
      - spec:schemas
      - experience:data-modeling
      - experience:consistency
  document-require-title:
    description: The `title` property should be present.
    message: title should be present
    severity: info
    given: $
    then:
      field: title
      function: truthy
    tags:
      - format:jsonschema
      - spec:schemas
