      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(StagingEnvironment)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:reliability
  schema-include-version-comparison:
    description: This property ensures that an API has the ability to compare two
      different versions of an API and see what the difference are between them.
    message: Has an API Comparison
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(compare|Compare)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:versioning
      - experience:documentation
  tag-apis-json-not-empty:
    description: If tags are declared they should not be empty — tags drive
      discovery in the catalog.
    message: tags should not be empty.
    given: $.tags
    severity: info
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          minItems: 1
    tags:
      - format:apis-json
      - spec:tags
      - experience:discoverability
  tag-require-upper-case:
    description: Maintaining consistent casing for tags applied to APIs.json
      contracts ensures a uniform appearance and enhances search and discovery.
      Each word in a tag should be capitalized, with the first letter of every
      word in a phrase treated the same way.
    message: Tags Upper Case
    severity: info
    given: $.tags.*
    then:
      function: pattern
      functionOptions:
        match: "[A-Z]\\w*"
    tags:
      - format:apis-json
      - spec:tags
      - experience:naming
      - experience:consistency
      - experience:discoverability
