documentationUrl: https://spotlight-rules.com/spec/
rules:
  api-baseurl-https:
    description: Each API baseURL should be an https URL.
    message: API baseURL should use https.
    given: $.apis[*].baseURL
    severity: info
    then:
      function: pattern
      functionOptions:
        match: ^https://
    tags:
      - format:apis-json
      - spec:apis
      - experience:security
  api-contact-include-email:
    description: The contact object in an APIs.json file allows for referencing the
      email address of a person or group. This property provides a convenient
      way for users to seek support for an API, using email as the default
      method to reach the team managing the API in production.
    message: API contact COULD have email.
    severity: info
    given: $.apis.*.contact.*
    then:
      field: email
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:documentation
      - experience:discoverability
  api-contact-include-full-name:
    description: The contact object in an APIs.json file includes a full name (FN)
      property, which specifies the formatted text corresponding to the contact
      name in the vCard for an API. This provides a quick and clear way to
      assign a person, group, or other point of contact to an API for addressing
      questions and providing support.
    message: Contact Could Have FN
    severity: info
    given: $.apis.*.contact.*
    then:
      field: FN
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:documentation
      - experience:discoverability
  api-entry-require-tag:
    description: Each API defined in an APIs.json artifact includes a property for
      adding one or more tags. These tags provide additional context about the
      resources or capabilities offered by the API, highlighting its business
      value and the domain in which it is applied.
    message: API MUST Have a Tags Object
    severity: info
    given: $.apis.*
    then:
      field: tags
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:discoverability
      - experience:data-modeling
  api-include-about-page:
    description: This property ensures provides a reference to an about page, either
      for the company, organization, or government agency behind an API, or
      specifically about the domain, team, and the APIs they produce.
    message: Has About
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(about|About)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:documentation
      - experience:discoverability
  api-include-contact:
    description: The contact object in an APIs.json file allows for associating a
      vCard that represents an individual or organizational entity. It includes
      common contact information such as a name, email, or other references,
      offering a standardized method for providing support for an API.
    message: API COULD have a contact.
    severity: info
    given: $.apis.*
    then:
      field: contact
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:discoverability
      - experience:documentation
  api-property-require-go-sdk:
    description: This property ensures that there is a Go SDK available for an API,
      making it easier for Go developers to integrate an API into their
      applications.
    message: Has Go SDK
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-sdk-go)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-java-sdk:
    description: This property ensures that there is a Java SDK available for an
      API, making it easier for Java developers to integrate an API into their
      applications.
    message: Has Java SDK
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-sdk-java)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-linting-rules:
    description: This property ensures that an API has governance rules applied,
      usually as part of a central set of governance rules, defined by policy,
      or stages of the API lifecycle.
    message: Has Linting Rules
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-rules|OpenApiRules)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:governance
      - experience:consistency
  api-property-require-node-sdk:
    description: This property ensures that there is a Node SDK available for an
      API, making it easier for Node developers to integrate an API into their
      applications.
    message: Has Node SDK
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-sdk-node)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-python-sdk:
    description: This property ensures that there is a Python SDK available for an
      API, making it easier for Python developers to integrate an API into their
      applications.
    message: Has Python SDK
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-sdk-python)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-road-map:
    description: This property ensures there is a reference to the road map for an
      API or for the entire API operations within domain, line of business, or
      teams.
    message: Has a Road Map
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-road-map|road-map|Roadmap|Road Map|RoadMap)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:discoverability
      - experience:documentation
      - experience:governance
  api-property-require-sandbox:
    description: This property ensures that an API has a reference to a sandbox for
      individual APIs or as part of common properties, providing sandbox,
      synthetic data, and mock servers for use in making test requests.
    message: Has a Blog
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(sandbox|Sandbox)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:documentation
  api-property-require-sdk:
    description: This property ensures that there is an SDK available for an API,
      making it easier for developers to integrate an API into their
      applications.
    message: Has SDK
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(sdk|sdks|SDKs)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-security-page:
    description: This property ensures there is a URL to the security page,
      providing details about how security is handled for an API.
    message: Has Security Path
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(Security|SecurityTesting)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:security
      - experience:documentation
  api-property-require-signup:
    description: This property ensures there is a link to where you sign up for an
      API, making sure API consumers can access in a single click.
    message: Has a Sign Up
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(X-signup|signup|Sign Up|SignUp)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:discoverability
  api-property-require-status-page:
    description: This property ensures that there is a status page available for
      each API, providing the uptime status for any given moment, as well as
      historical data.
    message: Has a Status Page
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(x-status|status|Status|StatusPage)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:reliability
      - experience:discoverability
  api-property-require-support-email:
    description: This property ensures that an API has email support, providing a
      valid email address that can be used to get API support.
    message: Has Support Email
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(support-email|SupportEmail)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:documentation
  api-property-require-support-issues-url:
    description: This property ensures that there are Git issues available to
      support an API, using the issues capability of GitHub, GitLab, or
      Bitbucket to support API consumers.
    message: Has Support Issues URL
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(SupportIssues|SupportGitHubIssues)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:documentation
  api-property-require-support-page:
    description: This property ensures that there is a support page available for an
      API, providing direct and in-direct support opportunities for each API or
      for entire API platform.
    message: Has Support Page
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(support|Support)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:usability
      - experience:documentation
  api-property-require-team:
    description: This property ensures that there is a reference to the team behind
      an API, providing a reference to business and engineering stakeholders.
    message: Has a Team Defined
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(team|teams|Team|Teams)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:governance
      - experience:documentation
  api-property-require-terms-of-service:
    description: This property ensures that an API has a reference to a terms of
      service, covering the legal side of using an API.
    message: Has an API Terms of Service
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(api-terms-of-service|terms-of-service|Terms of
            Service|TOS|TermsOfService)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:governance
      - experience:documentation
  api-property-require-use-cases:
    description: This property ensures there is a reference to the use cases for an
      API, helping align an API with the who, what, how, and why of putting an
      API to work.
    message: Has Use Cases
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(UseCases)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:documentation
      - experience:discoverability
  api-property-require-valid-url:
    description: This property ensures that properties of an API or API contract all
      have valid URLs, checking if any of the URLs are not properly formed, or
      could be other formats.
    message: Property URLs Are Valid
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: url
        function: pattern
        functionOptions:
          notMatch: ^((http|https)://)[-a-zA-Z0-9@:%._\+~#?&//=]{2,256}\.[a-z]{2,6}\b([-a-zA-Z0-9@:%._\+~#?&//=]*)$
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:consistency
      - experience:discoverability
  api-property-skill-require-versioning:
    description: This property ensures there is a reference to how APIs are
      versioned, providing a single place where teams can learn about how change
      is communicated.
    message: Has Versioning for API
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(versions|Versions|Versioning|versioning)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:versioning
      - experience:documentation
  api-property-require-video:
    description: This property ensures there is a reference to a video page or
      channel for an API.
    message: Has Videos for API
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(videos|Videos)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:documentation
      - experience:discoverability
  api-property-require-vocabulary:
    description: This property ensures that there is a centralized vocabulary in use
      for guiding the creation and usage of tags, path segments, and other
      metadata associated with an APIs.
    message: Has Vocabulary
    severity: info
    given:
      - $.apis.*.properties.*
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(vocabulary|vocabularies|Vocabulary|Vocabularies)\b
    tags:
      - format:apis-json
      - spec:apis
      - spec:properties
      - experience:consistency
      - experience:naming
      - experience:governance
  api-property-url-https:
    description: API property URLs (documentation, OpenAPI, etc.) should be https.
    message: API property url should use https.
    given: $.apis[*].properties[*].url
    severity: info
    then:
      function: pattern
      functionOptions:
        match: ^https://
    tags:
      - format:apis-json
      - spec:schemas
      - experience:security
  api-require-aid:
    description: Every API should have a unique identifier, known as an AID (API
      Identifier). The APIs.json file, contract, or collection contains its own
      AID, which the API uses as part of its reference. Additionally, the API
      applies a slugified version of its name, resulting in a unique,
      human-readable identifier for the API.
    message: APIs MUST have an aid property.
    severity: info
    given: $.apis.*
    then:
      field: aid
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:discoverability
      - experience:governance
  api-require-base-url:
    description: Each API defined within an APIs.json artifact can specify the base
      URL for the API. This URL serves as a reference point for developers
      during onboarding and when making API calls. Additionally, it helps
      identify the API and validate the domain it is associated with.
    message: APIs MUST Have a Base URL
    severity: info
    given: $.apis.*
    then:
      field: baseURL
      function: truthy
    tags:
      - format:apis-json
      - spec:apis
      - experience:usability
      - experience:discoverability
  api-tag-require-upper-case:
    description: Maintaining consistent casing for tags applied to individual APIs
      ensures a uniform appearance and enhances search and discovery. Each word
      in a tag should be capitalized, with the first letter of every word in a
      phrase treated the same way.
    message: API Tags MUST Be Upper Case
    severity: info
    given: $.apis.*.tags.*
    then:
      function: pattern
      functionOptions:
        match: "[A-Z]\\w*"
    tags:
      - format:apis-json
      - spec:apis
      - spec:tags
      - experience:naming
      - experience:consistency
      - experience:discoverability
  document-apis-json-url-https:
    description: The APIs.json url should be an https URL.
    message: APIs.json url should use https.
    given: $.url
    severity: info
    then:
      function: pattern
      functionOptions:
        match: ^https://
    tags:
      - format:apis-json
      - spec:document
      - experience:security
      - experience:discoverability
  document-include-business-impact-canvas:
    description: This ensures that an API has had the APIOps Business Impact Canvas
      applied to the API, requiring that the canvas is present in the repository
      and registered in the APIs.json index for the API, helping with discovery
      and governance.
    message: Has APIOps Cycles Business Impact Canvas
    severity: info
    given:
      - $.common.*
    then:
      - field: type
        function: pattern
        functionOptions:
          notMatch: \b(APIOpsBusinessImpactCanvas)\b
    tags:
      - format:apis-json
      - spec:collection
      - experience:governance
      - experience:documentation
  document-include-business-model-canvas:
