    message: apiKey scheme should be in a header or cookie, not the URL.
    given: $.components.securitySchemes[?(@ && @.type == 'apiKey')]
    severity: info
    then:
      field: in
      function: enumeration
      functionOptions:
        values:
          - header
          - cookie
    tags:
      - format:openapi
      - spec:components
      - experience:security
      - owasp:api2
  security-require-root:
    description: The API contract MUST include a 'security' section at the root level.
    message: "{{description}}: {{error}}"
    severity: info
    given: $
    then:
      field: security
      function: truthy
    formats:
      - oas3
    tags:
      - owasp:api2
      - format:openapi
      - spec:document
      - experience:security
      - experience:governance
  security-require-root-scheme:
    description: Security field MUST be present at the root of the spec with at
      least one item (ie. HTTPBearer, Token, APIKey, etc.).
    message: Security field MUST be present at the root of the spec with at least
      one item (ie.
    severity: info
    given: $
    then:
      field: security
      function: schema
      functionOptions:
        schema:
          type: array
          minItems: 1
    tags:
      - owasp:api2
      - format:openapi
      - spec:document
      - experience:security
      - experience:governance
  security-scheme-require-description:
    description: Every security scheme should declare a description so consumers
      know how to authenticate (which token, where to get it, what scopes).
    message: Security scheme should have a description.
    given: $.components.securitySchemes[*]
    severity: info
    then:
      field: description
      function: truthy
    tags:
      - format:openapi
      - spec:components
      - experience:security
      - owasp:api2
  server-must-not-specify-port:
    description: Port MUST NOT be specified or required to use the API, except for
      'localhost' testing in a spec.
    message: Port MUST NOT be specified or required to use the API, except for
      'localhost' testing in a spec.
    severity: info
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        notMatch: (?!https?://localhost)(https?://.*):(\d*)\/?(.*)
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:servers
      - experience:usability
      - experience:consistency
  server-must-use-https:
    description: Servers MUST be https and no other protocol is allowed unless using
      localhost.
    message: Servers MUST be https and no other protocol is allowed unless using
      localhost.
    severity: info
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: ^(https:|http://localhost)
    formats:
      - oas3
    tags:
      - owasp:api8
      - format:openapi
      - spec:servers
      - experience:security
      - experience:reliability
  server-on-approved-domain:
    description: APIs SHOULD be accessible under api.spscommerce.com.
    message: APIs SHOULD be accessible under api.spscommerce.com.
    severity: info
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: api.spscommerce.com|api.sps-internal.com|localhost
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:servers
      - experience:governance
      - experience:consistency
  server-require-description:
    description: Servers must have a description.
    message: Server {{path}} must have a description.
    severity: info
    given:
      - $.servers[*]
      - $.paths..servers
    then:
      field: description
      function: truthy
    tags:
      - format:openapi
      - spec:servers
      - spec:paths
      - experience:documentation
  server-require-https:
    description: ALL requests MUST go through `https` protocol only.
    message: Servers MUST be https and no other protocol is allowed.
    severity: info
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: /^https:/
    formats:
      - oas3
    tags:
      - owasp:api8
      - format:openapi
      - spec:servers
      - experience:security
  server-require-https-2:
    description: "Servers must use https to ensure the origin of the responses and
      protect the integrity and the confidentiality of the communication. You
      can use `http://` only on sandboxes environment. Use `x-sandbox: true` to
      skip this kind of check."
    message: "Non-sandbox url  {{value}} {{error}}. Add `x-sandbox: true` to skip
      this check on a specific server."
    severity: info
    given:
      - $.servers[?(@["x-sandbox"] != true)]
      - $.paths..servers[?(@["x-sandbox"] != true)]
    then:
      field: url
      function: pattern
      functionOptions:
        match: ^https://.*
    tags:
      - owasp:api8
      - format:openapi
      - spec:servers
      - spec:paths
      - experience:security
  server-url-include-version:
    description: API URLs versions should meet the Trimble API Standards.
    message: "{{error}}"
    severity: info
    given: $.servers
    then:
      function: trimble-valid-version-checker
    tags:
      - format:openapi
      - spec:servers
      - experience:versioning
      - experience:consistency
  server-url-meet-standards:
    description: API URLs should meet the Trimble API Standards.
    message: "{{error}}"
    severity: info
    given: $.servers
    then:
      function: trimble-valid-url-checker
    tags:
      - format:openapi
      - spec:servers
      - experience:consistency
      - experience:governance
  server-url-must-be-lowercase:
    description: Server URL SHOULD BE lowercase.
    message: Server URL SHOULD BE lowercase.
    severity: info
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: ^[^A-Z]*$
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:servers
      - experience:naming
      - experience:consistency
  server-url-require-https:
    description: API server URLs should use HTTPS to ensure encrypted communication
      between clients and servers, protecting sensitive data in transit.
    message: Server URL MUST Use HTTPS
    severity: info
    given: $.servers[*]
    then:
      field: url
      function: pattern
      functionOptions:
        match: ^https://
    tags:
      - owasp:api8
      - format:openapi
      - spec:servers
      - experience:security
  tag-names-title-case:
    description: The first letter of each word in a tag being applied to APIs needs
      to be capitalized, keeping the tags being applied across APIs the same
      look and feel for organizing and publishing to documentation.
    message: Tag Names MUST Have First Letter in Each Word Capitalized
    severity: info
    given: $.tags.*.name
    then:
      function: pattern
      functionOptions:
        match: "[A-Z]\\w*"
    tags:
      - format:openapi
      - spec:tags
      - experience:naming
      - experience:consistency
  tag-no-camel-case:
    description: Detects a tag with camelCase (personalItem) text within it.
    message: Tag names cannot use Camel Case. Please rename {{value}}.
    severity: info
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /^[a-z]+[A-Z][a-z]+$/g
    tags:
      - format:openapi
      - spec:paths
      - spec:tags
      - experience:naming
      - experience:consistency
  tag-no-pascal-case:
    description: Tag names cannot use Pascal Case. Please rename {{value}}.
    message: Tag names cannot use Pascal Case. Please rename {{value}}.
    severity: info
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /[A-Z][a-z]+[A-Z][a-z]+$/g
    tags:
      - format:openapi
      - spec:paths
      - spec:tags
      - experience:naming
      - experience:consistency
  tag-no-version-info:
    description: Tag names cannot have version information {{value}}. Consider
      versioning your API.
    message: Tag names cannot have version information {{value}}. Consider
      versioning your API.
    severity: info
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /(V|v)\s?[0-9]+/g
    tags:
      - format:openapi
      - spec:paths
      - spec:tags
      - experience:naming
      - experience:versioning
  tag-require-at-least-one:
    description: There needs to be at least one tag applied to an OpenAPI, providing
      a key word or phrase that can be applied to API operations.
    message: MUST Be At Least One Tag
    severity: info
    given: $
    then:
      field: tags
      function: length
      functionOptions:
        min: 1
    tags:
      - format:openapi
      - spec:document
      - experience:discoverability
      - experience:consistency
  tag-require-name:
    description: Tags used as part of an OpenAPI should have names, providing a
      simple key word or phrase that represents the tag being applied to APIs.
    message: Tags MUST Have a Name
    severity: info
    given: $.tags[*]
    then:
      field: name
      function: truthy
    tags:
      - format:openapi
      - spec:tags
      - experience:discoverability
      - experience:naming
