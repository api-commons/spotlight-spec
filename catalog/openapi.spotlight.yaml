  response-error-match-problem-schema:
    description: 'WARN: This rule is under implementation and just provides an hint.
      Error management is a key enabler of a resilient API ecosystem. Enforcing
      a consistent schema for errors between different APIs, enables client to
      properly implement an error management strategy, with positive impacts for
      users. This rule inspects the schema returned by an error response and
      verifies whether it contains the main properties defined in RFC7807:
      `status`, `title` and `detail`. An example of a valid payload is ``` {
      "title": "Not Found", "status": 404, "detail": "Book does not exist; id:
      123" } ``` See recommendation RAC_REST_NAME_007.'
    message: Your schema doesn't seem to match RFC7807. Are you sure it is ok? {{path}}
    severity: info
    given: $.paths.[*].responses[?(@property.match(/^(4|5|default)/))][[schema]]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            status:
              type: integer
            title:
              type: string
            detail:
              type: string
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:paths
      - spec:responses
      - spec:schemas
      - experience:error-handling
      - experience:consistency
  response-error-require-description:
    description: Check if the response description is appropriate for all requests.
    message: "{{error}}"
    severity: info
    given: $.paths.*.*.responses
    then:
      function: trimble-check-description-for-all-error-responses
    tags:
      - format:openapi
      - spec:paths
      - spec:responses
      - experience:documentation
      - experience:error-handling
  response-error-schema-problem-property-names:
    description: 'WARN: This rule is under implementation and just provides an hint.
      Error management is a key enabler of a resilient API ecosystem. Enforcing
      a consistent schema for errors between different APIs, enables client to
      properly implement an error management strategy, with positive impacts for
      users. Errors should return RFC7807 objects. Instead, this schema seems to
      use non standard properties such as: `message`, `msg` and `code`. An error
      of the following form ``` { "msg": "Book with id: 123 does not exist.",
      "code": 6063 } ``` can be expressed in RFC7807 with ``` { "detail": "Book
      with id: 123 does not exist.", "type":
      "https://api.example/v1/errors/6063", "status": 404, "title": "Not Found"
      } ``` Returning an URI in `type`, instead of an opaque `code` can help the
      client in better identifying the error; moreover the URI though it should
      not be dereferenced automatically, can return an actual resource providing
      guidance in addressing the issue. See recommendation RAC_REST_NAME_007.'
    message: Error response doesn't seem to match RFC7807. Are you sure it is ok?
      {{path}}
    severity: info
    given: $.[responses][?(@property.match(/^(4|5|default)/))][[schema]][properties].*~
    then:
      field: "@key"
      function: pattern
      functionOptions:
        notMatch: message|code|msg
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:responses
      - spec:schemas
      - experience:error-handling
      - experience:consistency
