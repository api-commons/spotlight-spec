      (string).
    message: "{{property}} is not provided or not following required schema values."
    severity: info
    given: $..[?(@property=== "format" && @ == "sps-ref")]^
    then:
      - function: schema
        functionOptions:
          schema:
            type: object
            required:
              - maxLength
              - minLength
              - type
              - pattern
            properties:
              maxLength:
                type: integer
                minimum: 255
                maximum: 255
              minLength:
                type: integer
                minimum: 7
                maximum: 7
              type:
                type: string
              pattern:
                type: string
      - field: pattern
        function: pattern
        functionOptions:
          match: sps
      - field: type
        function: pattern
        functionOptions:
          match: ^string$
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - experience:data-modeling
      - experience:consistency
  schema-requestid-property-must-be-string:
