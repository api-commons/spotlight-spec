extends: spotlight:oas
functions:
  - baloise-assert-http-codes-for-operation
  - baloise-validate-tracing
  - digitalocean-ensureAllArraysHaveItemTypes
  - digitalocean-ensurePropertiesExample
  - digitalocean-ensureSchemaHasType
  - digitalocean-ensureSnakeCaseWithDigits
  - microcks-aas-verify-mocks
  - microcks-oas-verify-mocks
  - trimble-check-content-type-for-206-get-response-code
  - trimble-check-description-for-all-error-responses
  - trimble-check-description-for-all-success-responses
  - trimble-check-for-content-type-in-put-and-post-responses
  - trimble-check-for-path-parameter
  - trimble-check-for-query-parameter-in-every-path
  - trimble-check-for-response-in-every-request
  - trimble-check-if-application-or-json-in-put-and-post-response
  - trimble-check-if-response-body-json-in-get-response
  - trimble-check-standard-for-error-payload
  - trimble-delete-must-not-return-body
  - trimble-does-spec-contains-valid-http-verbs
  - trimble-invalid-symbol-in-path
  - trimble-is-valid-spec
  - trimble-no-http-verbs-in-path
  - trimble-operation-post-201-202-status-code
  - trimble-operation-summary-description
  - trimble-valid-http-response
  - trimble-valid-url-checker
  - trimble-valid-version-checker
functionsDir: ./functions
documentationUrl: https://spotlight-rules.com/spec/
rules:
  channel-parameter-require-examples:
    description: Parameter must have examples.
    message: Parameter must have examples
    severity: info
    given: $.channels.*.parameters.*.schema
    then:
      field: examples
      function: truthy
    formats:
      - aas2
    tags:
      - format:openapi
      - spec:channels
      - spec:parameters
      - spec:schemas
      - experience:documentation
      - experience:usability
  component-example-keys-snake-case:
    description: example key must be snake cased (e.g. snake_case).
    message: "{{error}}"
    severity: info
    given: $.components['examples'].*~
    then:
      function: digitalocean-ensureSnakeCaseWithDigits
    tags:
      - format:openapi
      - spec:components
      - spec:examples
      - experience:naming
      - experience:consistency
  component-message-require-examples:
    description: Message must have examples.
    message: Message must have examples
    severity: info
    given: $.components.messages.*
    then:
      field: examples
      function: truthy
    formats:
      - aas3
    tags:
      - format:openapi
      - spec:messages
      - spec:components
      - experience:documentation
      - experience:usability
  component-require-security-schemes:
    description: The API contract MUST include a 'securitySchemes' subsection under
      the 'components' section.
    message: "{{description}}: {{error}}"
    severity: info
    given: $.components
    then:
      field: securitySchemes
      function: truthy
    formats:
      - oas3
    tags:
      - owasp:api2
      - format:openapi
      - spec:components
      - experience:security
      - experience:governance
  document-cache-control-parameter:
    description: "Cache usage SHOULD be extensively detailed in the `description`
      property to avoid data leaks or the usage of stale data. This rule should
      ensure in some way that the api provider documented extensively the cache
      usage to avoid data leaks or usage of stale data. For now this ruleset
      tests: * the presence of following keywords in the `description`:
      `max-age`, `private`, `no-store`, `no-cache`. * that one and only one
      between Expires and Cache-Control is used. `Cache-Control` and `Expires`
      should not be used in conjuction, because `Cache-Control` overrides
      `Expires` when `max-age` is set. Instead if neither `Cache-Control` or
      `Expires` are set, clients MAY use euristic cache like described in
      RFC7234."
    message: Cache usage SHOULD be documented when used.
    severity: info
    given: $..[parameters][?(@.in == "header" && @.name.match(/Cache-Control/i))]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*(max-age|private|no-store|no-cache).*
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:parameters
      - spec:headers
      - topic:caching
      - experience:documentation
      - experience:reliability
      - experience:performance
  document-cache-response-header:
    description: "Cache usage SHOULD be extensively detailed in the `description`
      property to avoid data leaks or the usage of stale data. This rule should
      ensure in some way that the api provider documented extensively the cache
      usage to avoid data leaks or usage of stale data. For now this ruleset
      tests: * the presence of following keywords in the `description`:
      `max-age`, `private`, `no-store`, `no-cache`. * that one and only one
      between Expires and Cache-Control is used. `Cache-Control` and `Expires`
      should not be used in conjuction, because `Cache-Control` overrides
      `Expires` when `max-age` is set. Instead if neither `Cache-Control` or
      `Expires` are set, clients MAY use euristic cache like described in
      RFC7234."
    message: Cache usage in responses SHOULD be documented in Cache-Control and/or
      Expires. {{error}}
    severity: info
    given: $.[responses][?(@property[0] == "2"
      )][headers].[?(@property.match(/Cache-Control|Expires/i))]]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*(max-age|private|no-store|no-cache).*
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:responses
      - spec:headers
      - topic:caching
      - experience:documentation
      - experience:reliability
      - experience:performance
  document-owasp-api9-server:
    description: The API should declare its servers so all hosts and environments
      are inventoried — undocumented or stray non-production hosts are a common
      inventory-management risk (OWASP API9).
    message: API should declare its servers (host/environment inventory).
    given: $
    severity: info
    then:
      field: servers
      function: truthy
    tags:
      - format:openapi
      - spec:servers
      - experience:security
      - experience:governance
      - owasp:api9
  document-require-component-section:
    description: The API contract MUST include a 'components' section.
    message: "{{description}}: {{error}}"
    severity: info
    given: $
    then:
      field: components
      function: truthy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:document
      - experience:consistency
      - experience:governance
  document-require-external-docs:
    description: Defining external documentation provides a link to detailed API
      guides, tutorials, and reference material beyond the OpenAPI spec.
      Analysis shows 57.1% of APIs include external docs.
    message: External Docs MUST Be Defined
    severity: info
    given: $
    then:
      field: externalDocs
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:documentation
      - experience:discoverability
  document-require-jsonschemadialect:
    description: openapi document should declare a `jsonSchemaDialect` property.
    message: Missing `jsonSchemaDialect`.
    given: $
    severity: info
    then:
      field: jsonSchemaDialect
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:governance
      - experience:discoverability
  document-require-openapi:
    description: openapi document should declare a `openapi` property.
    message: Missing `openapi`.
    given: $
    severity: info
    then:
      field: openapi
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:governance
      - experience:discoverability
  document-require-path:
    description: openapi document should declare a `paths` property.
    message: Missing `paths`.
    given: $
    severity: info
    then:
      field: paths
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:governance
      - experience:discoverability
  document-require-realistic-examples:
    description: API design SHOULD include real-like examples for request and
      response definitions.
    message: The {{property}} SHOULD include a real-like example. Add realistic
      examples to improve API usability.
    severity: info
    given: $..[?(@.example || @.examples)]
    then:
      field: example
      function: truthy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:examples
      - experience:documentation
      - experience:usability
  document-require-server-defined:
    description: Every OpenAPI should define at least one server URL. Analysis shows
      97.2% of APIs define servers, providing consumers with the base URL needed
      to make requests.
    message: Servers MUST Be Defined
    severity: info
    given: $
    then:
      field: servers
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:usability
      - experience:discoverability
  document-require-webhooks:
    description: openapi document should declare a `webhooks` property.
    message: Missing `webhooks`.
    given: $
    severity: info
    then:
      field: webhooks
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:governance
      - experience:discoverability
  document-spec-must-not-be-empty:
    description: Spec should not be empty.
    message: "{{error}}"
    severity: info
    given: $
    then:
      function: trimble-is-valid-spec
    tags:
      - format:openapi
      - spec:document
      - experience:governance
  header-names-hyphenated-pascal-case:
    description: All `HTTP` headers MUST use `Hyphenated-Pascal-Case` notation.
    message: "'HTTP' headers MUST follow 'Hyphenated-Pascal-Case' notation"
    severity: info
    given: $..parameters[?(@.in == 'header')].name
    then:
      function: pattern
      functionOptions:
        match: /^([A-Z][a-z0-9]-)*([A-Z][a-z0-9])+/
    tags:
      - format:openapi
      - spec:parameters
      - spec:headers
      - experience:naming
      - experience:consistency
  header-no-x-prefix:
    description: "'HTTP' headers SHOULD NOT start with 'X-' RFC6648."
    message: HTTP header '{{value}}' SHOULD NOT start with 'X-' in {{path}}
    severity: info
    given:
      - $..parameters[?(@.in == 'header')].name
    then:
      function: pattern
      functionOptions:
        match: /^([^x]|.[^-])|RateLimit-/i
    tags:
      - format:openapi
      - spec:parameters
      - spec:headers
      - experience:naming
      - experience:consistency
  header-require-examples:
    description: Headers must include examples.
    message: "{{description}}; missing {{property}}"
    severity: info
    given: $..headers.*
    then:
      function: digitalocean-ensurePropertiesExample
    tags:
      - format:openapi
      - spec:headers
      - experience:documentation
      - experience:usability
  info-contact-require-email:
    description: Having a contact email address associated with the technical
      contract ensures that anyone who comes across the API has someone to email
      and get more information.
    message: Info MUST Have Contact Email
    severity: info
    given: $.info.contact
    then:
      field: email
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:discoverability
      - experience:documentation
  info-contact-require-name:
    description: Having a contact name associated with the technical contract
      ensures that anyone who comes across the API knows who to contact.
    message: Info MUST Have Contact Name
    severity: info
    given: $.info.contact
    then:
      field: name
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:discoverability
      - experience:documentation
  info-contact-require-url:
    description: Having a contact url associated with the technical contract ensures
      that anyone who comes across the API knows where to go to contact someone.
    message: Info MUST Have Contact URL
    severity: info
    given: $.info.contact
    then:
      field: url
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:discoverability
      - experience:documentation
  info-description-length-limit:
    description: Having a restriction on the length of the API description expressed
      as the OpenAPI info description helps provide constraints for consumers
      when adding a description, and keeps portals, landing pages,
      documentation, and discovery results more consistent.
    message: Info description MUST be less than 500 characters.
    severity: info
    given: $.info
    then:
      field: description
      function: length
      functionOptions:
        max: 500
    tags:
      - format:openapi
      - spec:info
      - experience:documentation
      - experience:consistency
  info-description-no-eval-tag:
    description: Eval functions MUST not be included in the description of an API,
      keeping descriptions to just the text that is needed, and relying on the
      rest of the OpenAPI to describe what is possible.
    message: Info Description MUST NOT Have Eval Tag
    severity: info
    given: $.info
    then:
      field: description
      function: pattern
      functionOptions:
        notMatch: ^\b(<eval)\b
    tags:
      - format:openapi
      - spec:info
      - experience:security
      - experience:documentation
  info-description-no-script-tag:
    description: Script tags MUST not be included in the description of an API,
      keeping descriptions to just the text that is needed, and relying on the
      rest of the OpenAPI to describe what is possible.
    message: Info Description MUST NOT Have Script Tag
    severity: info
    given: $.info
    then:
      field: description
      function: pattern
      functionOptions:
        notMatch: ^\b(<script)\b
    tags:
      - format:openapi
      - spec:info
      - experience:security
      - experience:documentation
  info-license-require-name:
    description: The license object should include a name property identifying the
      license type, such as Apache 2.0, MIT, or a proprietary license.
    message: Info License MUST Have Name
    severity: info
    given: $.info.license
    then:
      field: name
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:governance
      - experience:documentation
  info-license-require-url:
    description: The license object should include a URL linking to the full license
      text so API consumers can review the terms.
    message: Info License MUST Have URL
    severity: info
    given: $.info.license
    then:
      field: url
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:governance
      - experience:documentation
  info-microcks-extension-valid:
    description: x-microcks extension must be valid.
    message: x-microcks extension must be valid
    severity: info
    given: $.info.x-microcks
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            labels:
              type: object
              additionalProperties:
                type: string
          required:
            - labels
          additionalProperties: false
    formats:
      - oas3
      - aas2
      - aas3
    tags:
      - format:openapi
      - spec:info
      - experience:governance
      - experience:consistency
  info-owasp-api9-document-version:
    description: The API should declare a version in info.version so every published
      version is inventoried and retired versions can be tracked (OWASP API9 —
      improper inventory management).
    message: API should declare info.version for inventory management.
    given: $.info
    severity: info
    then:
      field: version
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:security
      - experience:governance
      - owasp:api9
  info-require-api-identifier:
    description: The `#/info/x-api-id` field can be used to associate an identifier
      to an API. This is useful to track an API even when its `#/info/title`
      changes.
    message: "API must have an unique identifier in x-api-id in #/info/x-api-id."
    severity: info
    given: $
    then:
      field: info.x-api-id
      function: truthy
    tags:
      - format:openapi
      - spec:document
      - experience:discoverability
      - experience:governance
  info-require-contact-2:
    description: Having a contact object associated with the technical contract
      ensures that anyone who comes across the API has someone to contact and
      get more information.
    message: Info MUST Have Contact Object
    severity: info
    given: $.info
    then:
      field: contact
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:discoverability
      - experience:documentation
  info-require-description:
    description: Info section is missing a description.
    message: Info section is missing a description.
    severity: info
    given: $.info
    then:
      field: description
      function: truthy
    formats:
      - oas3
      - oas3_1
    tags:
      - format:openapi
      - spec:info
      - experience:documentation
  info-require-license:
    description: Having a license defined in the info object clarifies the terms
      under which the API can be used. Analysis shows only 44.4% of APIs define
      a license, but it is essential for API governance and compliance.
    message: Info MUST Have License
    severity: info
    given: $.info
    then:
      field: license
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:governance
      - experience:documentation
  info-require-openapi-version-3x:
    description: APIs should use OpenAPI 3.x specification. Analysis of 773 API
      specs shows 97% use OpenAPI 3.x, with 86% on 3.1.0, making it the dominant
      standard for modern API definitions.
    message: OpenAPI MUST Be Version 3.x
    severity: info
    given: $
    then:
      field: openapi
      function: pattern
      functionOptions:
        match: ^3\.
    tags:
      - format:openapi
      - spec:document
      - experience:versioning
      - experience:governance
  info-require-summary:
    description: "The `#/info/x-summary` can be used to specify a brief, one-liner
      description of your API: this is very useful for catalog purposes (eg.
      this can be shown as your API subtitle in catalogs and developer portals).
      In OAS3.1 you can use the standard `#/info/summary` field."
    message: "API MUST have an one-liner #/info/x-summary field containing a brief
      description."
    severity: info
    given: $
    then:
      field: info.x-summary
      function: truthy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:document
      - experience:documentation
      - experience:discoverability
  info-require-terms-of-service:
    description: API MUST reference the URL of the Terms of Service in
      `#/info/termsOfService`.
    message: "API MUST reference the URL of the Terms of Service  in
      #/info/termsOfService."
    severity: info
    given: $
    then:
      field: info.termsOfService
      function: truthy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:document
      - experience:documentation
      - experience:governance
  info-require-title:
    description: Having a intuitive and helpful title for your API using the OpenAPI
      info title is the first impression you will make on the consumers of your
      API.
    message: Info MUST Have Title
    severity: info
    given: $.info
    then:
      field: title
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:documentation
      - experience:discoverability
  info-skill-require-version:
    description: Publishing a version for your OpenAPI technical contract helps you
      communicate change with consumers using Semantic or date-based versioning
      published to the info version property.
    message: Info MUST Have Version
    severity: info
    given: $.info
    then:
      field: version
      function: truthy
    tags:
      - format:openapi
      - spec:info
      - experience:versioning
  info-title-capitalized:
    description: Having a consistent casing for the title for your API helps provide
      constraints for teams naming the API, but also keep consistent with other
      APIs from across teams.
    message: Info Title Has First Characters Capitalized
    severity: info
    given: $.info.title
    then:
      function: pattern
      functionOptions:
        match: "[A-Z]\\w*"
    tags:
      - format:openapi
      - spec:info
      - experience:naming
      - experience:consistency
  info-title-max-length:
    description: Having a limitation on the length of the title for your API helps
      provide constraints for teams naming it, but also keep consistent with
      other APIs from across teams.
    message: Info Title MUST Be Less Than 50 Characters
    severity: info
    given: $.info
    then:
      field: title
      function: length
      functionOptions:
        max: 50
    tags:
      - format:openapi
      - spec:info
      - experience:consistency
      - experience:documentation
  info-version-must-be-semver:
    description: The API version field should follow [semantic
      versioning](https://semver.org/#semantic-versioning-specification-semver).
    message: Specs should follow semantic versioning. {{value}} is not a valid version.
    severity: info
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^[0-9]+.[0-9]+.[0-9]+(-[a-z0-9+.-]+)?
    tags:
      - format:openapi
      - spec:info
      - experience:versioning
      - experience:consistency
  info-version-must-use-semver:
    description: Version should use semantic versioning. {{value}} is not a valid version.
    message: Version should use semantic versioning. {{value}} is not a valid version.
    severity: info
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^([0-9]+.[0-9]+.[0-9]+)$
    tags:
      - format:openapi
      - spec:info
      - experience:versioning
      - experience:consistency
  info-version-semantic-and-stable:
    description: The API contract MUST have a stable version and MUST follow
      semantic versioning (e.g., '1.0.0'). Words like 'SNAPSHOT' or 'RELEASE'
      are not allowed.
    message: "{{description}}: {{error}}"
    severity: info
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^(?!.*\b(SNAPSHOT|RELEASE)\b)(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:info
      - experience:versioning
      - experience:consistency
  limit-nested-sub-resources:
    description: The hierarchy of nested resources SHOULD NOT contain more than 8
      resource names in the path.
    message: The hierarchy of nested resources SHOULD NOT contain more than 8
      resource names in the path.
    severity: info
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^([^/]*/){9,}
    tags:
      - format:openapi
      - spec:paths
      - experience:usability
      - experience:consistency
  limit-path-length:
    description: APIs SHOULD NOT expand their total URL length beyond a few hundred
      characters.
    message: APIs SHOULD NOT expand their total URL length beyond a few hundred
      characters.
    severity: info
    given: $.paths.*~
    then:
      function: length
      functionOptions:
        max: 100
    tags:
      - format:openapi
      - spec:paths
      - experience:usability
      - experience:consistency
  limit-path-parameter:
    description: The URL path should not contain more than 3 dynamic path parameters.
    message: The URL path should not contain more than 3 dynamic path parameters.
    severity: info
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(.*{{1}.*){4,}
    tags:
      - format:openapi
      - spec:paths
      - experience:usability
      - experience:consistency
  message-examples-form-complete-mocks:
    description: Message example must match params examples to form full mocks.
    message: "{{error}}"
    severity: info
    given: $.channels.*
    then:
      function: microcks-aas-verify-mocks
    formats:
      - aas2
    tags:
      - format:openapi
      - spec:channels
      - experience:documentation
      - experience:usability
  message-require-examples:
    description: Message must have examples.
    message: Message must have examples
    severity: info
    given: $.channels.*.[publish,subscribe].message
    then:
      field: examples
      function: truthy
    formats:
      - aas2
    tags:
      - format:openapi
      - spec:channels
      - spec:messages
      - experience:documentation
      - experience:usability
  operation-collection-support-filtering:
    description: Collection GET operations should support filtering via a filter
      query parameter (e.g. filter or filter[field]).
    message: Collection should support a filter query parameter.
    given: $.paths[*].get
    severity: info
    then:
      field: parameters
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required:
              - name
              - in
            properties:
              name:
                pattern: ^filter
              in:
                const: query
    tags:
      - format:openapi
      - spec:parameters
      - topic:pagination
      - experience:usability
      - experience:discoverability
      - experience:performance
  operation-collection-support-sorting:
    description: Collection GET operations should support sorting via a sort or
      order query parameter.
    message: Collection should support a sort/order query parameter.
    given: $.paths[*].get
    severity: info
    then:
      field: parameters
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required:
              - name
              - in
            properties:
              name:
                pattern: ^(sort|order)
              in:
                const: query
