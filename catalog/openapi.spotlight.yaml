      function: pattern
      functionOptions:
        notMatch: ^(negotiate|oauth)$
    tags:
      - format:openapi
      - spec:components
      - experience:security
      - owasp:api2
  security-owasp-api2-no-api-keys-in-url:
    description: API key security schemes should be sent in a header or cookie,
