      Security rules are defined in the `securityScheme` section. An example of
      a security rule applied at global level. ``` security: - BasicAuth: []
      paths: /books: {} /users: {} securitySchemes: BasicAuth: scheme: http
      type: basic ``` An example of a security rule applied at operation level,
      which eventually overrides the global one ``` paths: /books: post:
      security: - AccessToken: [] securitySchemes: BasicAuth: scheme: http type:
