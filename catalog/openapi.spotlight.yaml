    message: Schema String Properties MUST Have Maximum Length
    severity: info
    given: $.components.schemas.*.properties[?(@.type == 'string')]
    then:
      field: maxLength
      function: truthy
    tags:
      - owasp:api4
      - format:openapi
      - spec:schemas
      - spec:components
      - experience:data-modeling
      - experience:reliability
  schema-string-property-require-min-length:
    description: Schema properties that are of the string type have the min length
      applied defining the shape of the property.
    message: Schema String Properties MUST Have Minimum Length
    severity: info
    given: $.components.schemas.*.properties[?(@.type == 'string')]
    then:
      field: minLength
      function: truthy
    tags:
      - format:openapi
      - spec:schemas
      - spec:components
      - experience:data-modeling
      - experience:reliability
  schema-string-require-max-length:
    description: "String length should be limited to avoid an attacker to send very
      long strings to your service. You can do this in different ways: - specify
      a `maxLength` - constraint the possible values with an `enum` - use a
      constrained `format` like `date` or `date-time`. A constrained string
      using the `date` format. ``` ConstrainedString: type: string format: date
      ``` Another constrained string using `maxLength`. You can always add
      further constraints using a `pattern` or a `format`. ``` ZipCode: type:
      string maxLength: 5 pattern: '[0-9]{5}' ``` For further security, you can
      always limit string length even in conjunction with `format` and
      `pattern`."
    message: Strings (non enum) must specify a maximum length. {{path}} {{error}}
    severity: info
    given:
      - $.[?(@.type=="string" && !@.enum && @.format!="date" && @.format
        !="date-time" )]
    then:
      - field: maxLength
        function: defined
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - experience:security
      - experience:data-modeling
  schema-string-require-pattern-or-format:
    description: "String length should be limited to avoid an attacker to send very
      long strings to your service. You can do this in different ways: - specify
      a `maxLength` - constraint the possible values with an `enum` - use a
      constrained `format` like `date` or `date-time`. A constrained string
      using the `date` format. ``` ConstrainedString: type: string format: date
      ``` Another constrained string using `maxLength`. You can always add
      further constraints using a `pattern` or a `format`. ``` ZipCode: type:
      string maxLength: 5 pattern: '[0-9]{5}' ``` For further security, you can
      always limit string length even in conjunction with `format` and
      `pattern`."
    message: Strings (non enum) must specify a pattern or a format. {{path}}
    severity: info
    given:
      - $.[?(@.type=="string" && !@.enum && @.format!="date" && @.format
        !="date-time" )]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          anyOf:
            - required:
                - pattern
            - required:
                - format
          additionalProperties: true
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - experience:security
      - experience:data-modeling
  schema-use-fingerprint-not-hash:
    description: Rather than property names refering to the implementation for
      'hash' or 'hashkey', you MUST use the property name 'fingerprint'.
    message: "{{property}} is not using property name fingerprint."
    severity: info
    given: $.components.schemas..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^hashkey|hashKey|hash$
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - spec:components
      - experience:naming
      - experience:consistency
  schema-use-id-not-identifier:
    description: Use abbreviations instead of long form names, i.e. identifier SHOULD BE id.
    message: Use abbreviations instead of long form names, i.e.
    severity: info
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^identifier$
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - experience:naming
      - experience:consistency
  schema-use-org-not-organization:
    description: Use abbreviations instead of long form names, i.e. organization
      SHOULD BE org.
    message: Use abbreviations instead of long form names, i.e.
    severity: info
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: (^organization([A-Z]|$)|Organization([A-Z]|$))
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:schemas
      - experience:naming
      - experience:consistency
  schema-write-operation-require-security:
    description: "Your API should be protected by a `security` rule either at global
      or operation level. Operations should be protected specially when they are
      tied to non-idempotent HTTP methods like `POST`, `PUT`, `PATCH` and
      `DELETE`. This is done with one or more non-empty `security` rules.
      Security rules are defined in the `securityScheme` section. An example of
      a security rule applied at global level. ``` security: - BasicAuth: []
      paths: /books: {} /users: {} securitySchemes: BasicAuth: scheme: http
      type: basic ``` An example of a security rule applied at operation level,
      which eventually overrides the global one ``` paths: /books: post:
      security: - AccessToken: [] securitySchemes: BasicAuth: scheme: http type:
      basic AccessToken: scheme: http type: bearer bearerFormat: JWT ```."
    message: "The following non-idempotent operation is not protected by a
      `security` rule: {{path}}"
    severity: info
    given:
      - $.paths.*[?(@property.match(/^(post|put|patch|delete)/))]
    then:
      - field: security
        function: schema
        functionOptions:
          schema:
            items:
              type: object
              minProperties: 1
            minItems: 1
            type: array
    formats:
      - oas3
    tags:
      - owasp:api2
      - format:openapi
      - spec:paths
      - spec:operations
      - experience:security
  security-bearer-scheme-require-bearer-format:
    description: HTTP bearer security schemes should declare a bearerFormat (e.g.
      JWT) so consumers know the token type and tooling can validate it.
    message: HTTP bearer scheme should declare a bearerFormat (e.g. JWT).
    given: $.components.securitySchemes[?(@ && @.type == 'http' && @.scheme ==
      'bearer')]
    severity: info
    then:
      field: bearerFormat
      function: truthy
    tags:
      - format:openapi
      - spec:components
      - experience:security
      - owasp:api2
  security-jwt-scheme-require-description:
    severity: info
    description: 'Json Web Tokens RFC7519 is a compact, URL-safe means of
      representing claims to be transferred between two parties. JWT can be
      enclosed in encrypted or signed tokens like JWS and JWE. The [JOSE IANA
      registry](https://www.iana.org/assignments/jose/jose.xhtml) provides
      algorithms information. RFC8725 describes common pitfalls in the JWx
      specifications and in their implementations, such as: - the ability to
      ignore algorithms, eg. `{"alg": "none"}`; - using insecure algorithms like
      `RSASSA-PKCS1-v1_5` eg. `{"alg": "RS256"}`. An API using JWT should
      explicit in the `description` that the implementation conforms to RFC8725.
      ``` components: securitySchemes: JWTBearer: type: http scheme: bearer
      bearerFormat: JWT description: |- A bearer token in the format of a JWS
      and conformato to the specifications included in RFC8725. ```.'
    message: JWT usage should be detailed in `description` {{error}}.
    given:
      - $.[securitySchemes][?(@.bearerFormat=="jwt" || @.bearerFormat=="JWT")]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*RFC8725.*
    tags:
      - owasp:api2
      - format:openapi
      - spec:security
      - experience:security
      - experience:documentation
  security-no-http-basic-auth:
    description: Consider a more secure alternative to HTTP Basic.
    message: HTTP Basic is an insecure way to pass credentials around, use an
      alternative.
    severity: info
    given: $.components.securitySchemes[*]
    then:
      field: scheme
      function: pattern
      functionOptions:
        notMatch: basic
    tags:
      - owasp:api2
      - format:openapi
      - spec:security
      - spec:components
      - experience:security
  security-oauth-disallow-insecure-flows:
    description: The OAuth2 authorization framework defines various [grant
      types](https://tools.ietf.org/html/rfc6749#section-1.3), most notably the
      [AuthorizationCode](https://tools.ietf.org/html/rfc6749#section-1.3.1) and
      the [Client
      Credentials](https://tools.ietf.org/html/rfc6749#section-1.3.4). Some
      grant types are now considered insecure and MUST not be used, including
      `implicit` and `password`. The new
      [OAuth2.1](https://tools.ietf.org/html/draft-ietf-oauth-v2-1-01) still in
      draft, removes them and suggests to replace the `implicit` with
      `authorizationCode` + PKCE defined in RFC7636.
    message: 'Do not use oauth2 insecure flow: "{{property}}".'
    severity: info
    given:
      - $.[?(@.type=="oauth2")].flows
    then:
      - field: implicit
        function: falsy
      - field: password
        function: falsy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:security
      - experience:security
      - owasp:api2
  security-oauth-endpoints-require-https:
    description: OAuth2 endpoints must use `https://`.
    message: OAuth endpoints must use https://
    severity: info
    given:
      - $.[securitySchemes][?(@.type=="oauth2")][*].[?(@property.match(/url$/i))]
    then:
      - field: value
        function: pattern
        functionOptions:
          match: ^https://
    formats:
      - oas3
    tags:
      - owasp:api8
      - format:openapi
      - spec:security
      - experience:security
  security-oauth-flow-require-scopes:
    description: OAuth2 flows should define scopes so authorization is granular and
      least-privilege rather than all-or-nothing.
    message: OAuth2 flow should define at least one scope.
    given: $.components.securitySchemes[?(@ && @.type == 'oauth2')].flows[*]
    severity: info
